<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Raga Biofeedback</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0b08;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: 'Georgia', serif;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #ui {
    position: fixed;
    bottom: 60px;
    left: 0; right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
  #raga-name {
    font-size: 13px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(210, 160, 80, 0.55);
    margin-bottom: 18px;
    transition: opacity 2s ease, color 3s ease;
    font-weight: normal;
  }
  #hr-display {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: rgba(180, 130, 60, 0.30);
    transition: opacity 2s ease;
  }
  #phase-display {
    position: fixed;
    top: 50px;
    left: 0; right: 0;
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(180, 120, 40, 0.18);
    pointer-events: none;
    transition: opacity 3s ease, color 4s ease;
  }
  #waiting {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: rgba(180, 130, 60, 0.25);
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="raga-name">—</div>
  <div id="hr-display"></div>
</div>
<div id="phase-display"></div>
<div id="waiting">place finger on sensor</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

// State
let state = {
  hr:        70,
  raga:      'waiting',
  autonomy:  0,
  phase:     'waiting',
  active:    false,
  beatPulse: 0,    // 0-1, decays each frame
  lastBeat:  0
};

// Color palettes per raga
// All warm dark amber base, but each raga has its own ink color
const palettes = {
  bhairav: {
    ink:    [120, 80,  30],   // deep amber brown — austere
    glow:   [180, 110, 40],
    bg:     '#0a0806'
  },
  bhimpalasi: {
    ink:    [180, 110, 50],   // warm amber — longing
    glow:   [220, 150, 70],
    bg:     '#0e0b08'
  },
  bhupali: {
    ink:    [210, 150, 60],   // bright amber gold — joyful
    glow:   [255, 190, 80],
    bg:     '#100d07'
  },
  free: {
    ink:    [160, 80,  20],   // rust — unpredictable
    glow:   [200, 100, 40],
    bg:     '#0c0806'
  },
  waiting: {
    ink:    [80, 60, 30],
    glow:   [120, 90, 40],
    bg:     '#0a0806'
  }
};

// Ink drops
let drops = [];
const MAX_DROPS = 28;

function spawnDrop(forced) {
  if(drops.length >= MAX_DROPS && !forced) return;
  const pal    = palettes[state.raga] || palettes.waiting;
  const cx     = canvas.width  * 0.5 + (Math.random()-0.5) * canvas.width  * 0.6;
  const cy     = canvas.height * 0.5 + (Math.random()-0.5) * canvas.height * 0.6;
  const radius = 1 + Math.random() * (state.active ? 60 : 20);
  const speed  = hrToSpeed() * (0.4 + Math.random() * 0.6);
  drops.push({
    x: cx, y: cy,
    r: 0,
    maxR: radius,
    speed: speed,
    alpha: 0.08 + Math.random() * 0.12,
    color: pal.ink,
    born: Date.now()
  });
}

function hrToSpeed() {
  // Maps HR to expansion speed
  // Bhairav (low HR): very slow
  // Bhupali (high HR): faster
  return state.hr ? (state.hr - 40) / 120 * 0.6 + 0.2 : 0.3;
}

function spawnBeatDrop() {
  // On each heartbeat, spawn a prominent drop
  const pal = palettes[state.raga] || palettes.waiting;
  drops.push({
    x: canvas.width  * 0.5 + (Math.random()-0.5) * 80,
    y: canvas.height * 0.5 + (Math.random()-0.5) * 80,
    r: 0,
    maxR: 80 + Math.random() * 60,
    speed: hrToSpeed() * 1.4,
    alpha: 0.18,
    color: pal.glow,
    born: Date.now()
  });
}

// Background fade — very slow, barely erases old drops
// This creates the ink-accumulation effect
let bgAlpha = 0.012;

function draw() {
  requestAnimationFrame(draw);

  const pal = palettes[state.raga] || palettes.waiting;

  // Very faint bg clear — lets old ink linger
  ctx.fillStyle = `rgba(${parseInt(pal.bg.slice(1,3),16)},${parseInt(pal.bg.slice(3,5),16)},${parseInt(pal.bg.slice(5,7),16)},${bgAlpha})`;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // In free/asserting phase, bg fades faster = more visual chaos
  bgAlpha = state.autonomy > 0.7 ? 0.03 : 0.012;

  // Spawn drops at HR-driven rate
  const spawnRate = state.active ? (state.hr || 70) / 800 : 0.003;
  if(Math.random() < spawnRate) spawnDrop();

  // Draw and update drops
  drops = drops.filter(d => d.r < d.maxR);
  drops.forEach(d => {
    d.r += d.speed * (1 + state.autonomy * 0.5);

    const fadeIn  = Math.min(1, d.r / (d.maxR * 0.3));
    const fadeOut = 1 - (d.r / d.maxR);
    const alpha   = d.alpha * fadeIn * fadeOut;

    // In free phase, drops become more elliptical and distorted
    ctx.save();
    ctx.translate(d.x, d.y);
    if(state.autonomy > 0.7) {
      const skew = (state.autonomy - 0.7) * 2;
      ctx.rotate(Math.random() * 0.02 * skew);
      ctx.scale(1 + Math.random() * skew * 0.3, 1 - Math.random() * skew * 0.1);
    }

    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, d.r);
    grad.addColorStop(0,   `rgba(${d.color[0]},${d.color[1]},${d.color[2]},${alpha * 1.4})`);
    grad.addColorStop(0.5, `rgba(${d.color[0]},${d.color[1]},${d.color[2]},${alpha * 0.6})`);
    grad.addColorStop(1,   `rgba(${d.color[0]},${d.color[1]},${d.color[2]},0)`);

    ctx.beginPath();
    ctx.arc(0, 0, d.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
  });

  // Beat pulse — brief bright flash at center
  if(state.beatPulse > 0) {
    const bp   = state.beatPulse;
    const col  = pal.glow;
    const grad = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, 120 * bp
    );
    grad.addColorStop(0,   `rgba(${col[0]},${col[1]},${col[2]},${bp * 0.15})`);
    grad.addColorStop(1,   `rgba(${col[0]},${col[1]},${col[2]},0)`);
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 120 * bp, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    state.beatPulse *= 0.88;
  }
}

// UI updates
function updateUI() {
  const ragaEl  = document.getElementById('raga-name');
  const hrEl    = document.getElementById('hr-display');
  const phaseEl = document.getElementById('phase-display');
  const waitEl  = document.getElementById('waiting');

  const names = {
    bhairav:    'Bhairav  ·  dawn',
    bhimpalasi: 'Bhimpalasi  ·  afternoon',
    bhupali:    'Bhupali  ·  evening',
    free:       'free',
    waiting:    '—'
  };

  ragaEl.textContent  = names[state.raga] || '—';
  ragaEl.style.color  = state.active
    ? `rgba(210,160,80,${0.3 + state.autonomy * 0.3})`
    : 'rgba(180,130,60,0.15)';

  hrEl.textContent   = state.active && state.hr
    ? Math.round(state.hr) + ' bpm'
    : '';

  // Phase text fades in as autonomy grows
  const phaseNames = {
    listening:    'listening',
    negotiating:  'negotiating',
    asserting:    'asserting',
    free:         'free'
  };
  phaseEl.textContent = phaseNames[state.phase] || '';
  phaseEl.style.opacity = state.autonomy > 0.15 ? 1 : 0;
  phaseEl.style.color = state.autonomy > 0.7
    ? 'rgba(200,100,40,0.35)'
    : 'rgba(180,120,40,0.18)';

  waitEl.style.opacity = state.active ? 0 : 1;
}

setInterval(updateUI, 500);

// WebSocket connection to Python relay
function connect() {
  const ws = new WebSocket('ws://localhost:8765');

  ws.onopen = () => {
    console.log('Connected to relay');
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);

      if(msg.type === 'hr') {
        const now = Date.now();
        // Detect beat from HR timing
        const expectedInterval = 60000 / (msg.value || 70);
        if(now - state.lastBeat > expectedInterval * 0.8) {
          state.beatPulse = 1.0;
          state.lastBeat  = now;
          spawnBeatDrop();
        }
        state.hr     = msg.value;
        state.active = true;
      }

      if(msg.type === 'raga') {
        state.raga = msg.value;
        // Spawn burst of drops on raga change
        for(let i = 0; i < 8; i++) {
          setTimeout(() => spawnDrop(true), i * 120);
        }
      }

      if(msg.type === 'autonomy') {
        state.autonomy = msg.value;
      }

      if(msg.type === 'phase') {
        state.phase = msg.value;
      }

      if(msg.type === 'reset') {
        state.active   = false;
        state.hr       = 70;
        state.raga     = 'waiting';
        state.autonomy = 0;
        state.phase    = 'waiting';
        drops = [];
      }

    } catch(e) {}
  };

  ws.onclose = () => {
    console.log('Disconnected. Reconnecting in 2s...');
    setTimeout(connect, 2000);
  };
}

connect();
draw();
</script>
</body>
</html>
